<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Kokoon</title>
<meta name="description" content="Get in touch with the Kokoon team.">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --ink: #080810; --paper: #fdf4e5; --muted: rgba(8,8,16,.42); }
html { height: 100%; }
body { min-height: 100%; background: var(--paper); font-family: 'Noto Serif JP', serif; color: var(--ink); display: flex; flex-direction: column; }
.page-nav { padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
.page-nav a { font-size: .65rem; letter-spacing: .12em; text-transform: lowercase; color: var(--muted); text-decoration: none; transition: color .2s; }
.page-nav a:hover { color: var(--ink); }
.page-nav .brand { font-family: 'Zen Antique Soft', serif; font-size: 1.2rem; letter-spacing: .1em; color: var(--ink); }
.page { flex: 1; max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 4rem; width: 100%; }
.page h1 { font-family: 'Zen Antique Soft', serif; font-size: 1.8rem; letter-spacing: .08em; font-weight: 400; margin-bottom: .75rem; }
.page .sub { font-size: .88rem; line-height: 1.9; font-weight: 200; color: var(--muted); margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; }
label { display: block; font-size: .65rem; letter-spacing: .14em; text-transform: lowercase; color: var(--muted); margin-bottom: .4rem; }
input, textarea {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(8,8,16,.18);
  padding: .75rem 1rem;
  font-family: 'Noto Serif JP', serif;
  font-size: .88rem;
  font-weight: 200;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
  border-radius: 0;
  -webkit-appearance: none;
}
input:focus, textarea:focus { border-color: var(--ink); }
textarea { resize: vertical; min-height: 140px; }
.btn-submit {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: .85rem 2.5rem;
  font-family: 'Noto Serif JP', serif;
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: lowercase;
  cursor: pointer;
  transition: opacity .2s;
  margin-top: .5rem;
}
.btn-submit:hover { opacity: .75; }
.btn-submit:disabled { opacity: .4; cursor: default; }
.form-status { font-size: .82rem; font-weight: 200; margin-top: 1rem; line-height: 1.7; }
.form-status.success { color: #3a7d44; }
.form-status.error { color: #b94040; }
.site-footer { border-top: 1px solid rgba(8,8,16,.08); padding: 1.8rem 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem 1.6rem; }
.site-footer a { font-size: .62rem; font-weight: 200; letter-spacing: .14em; text-transform: lowercase; color: var(--muted); text-decoration: none; transition: color .2s; }
.site-footer a:hover { color: var(--ink); }
.site-footer .footer-app { color: var(--ink); font-weight: 400; }
</style>
</head>
<body>

<nav class="page-nav">
  <a href="/" class="brand">Kokoon</a>
  <a href="/">&larr; home</a>
</nav>

<main class="page">
  <h1>Contact</h1>
  <p class="sub">We'd love to hear from you — feedback, bug reports, feature ideas, or just to say hello.</p>

  <form id="contact-form">
    <div class="form-group">
      <label for="name">name</label>
      <input type="text" id="name" name="name" required autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="message">message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">send message</button>
    <p class="form-status" id="form-status" aria-live="polite"></p>
  </form>
</main>

<footer class="site-footer">
  <a href="/pricing">pricing</a>
  <a href="/faq">faq</a>
  <a href="/blog">blog</a>
  <a href="/privacy">privacy</a>
  <a href="/terms">terms</a>
  <a href="/contact">contact</a>
  <a href="/app" class="footer-app">open app &rarr;</a>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('form-status');
  btn.disabled = true;
  btn.textContent = 'sending…';
  status.textContent = '';
  status.className = 'form-status';

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  try {
    const res = await fetch('https://bvfxxedhvdknwvvkyuph.supabase.co/functions/v1/send-contact-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, message }),
    });
    if (res.ok) {
      status.textContent = "Message sent. We'll get back to you within a day or two.";
      status.classList.add('success');
      e.target.reset();
    } else {
      throw new Error();
    }
  } catch {
    status.textContent = 'Something went wrong. Try emailing us directly at hello@kokoon.app.';
    status.classList.add('error');
  }

  btn.disabled = false;
  btn.textContent = 'send message';
});
</script>

</body>
</html>
