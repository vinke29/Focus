<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Kokoon</title>
<meta name="description" content="Get in touch with the Kokoon team.">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --ink: #080810; --paper: #fdf4e5; --muted: rgba(8,8,16,.42); }
html { height: 100%; }
body { min-height: 100%; background: var(--paper); font-family: 'Noto Serif JP', serif; color: var(--ink); display: flex; flex-direction: column; }
.page-nav { padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
.page-nav a { font-size: .65rem; letter-spacing: .12em; text-transform: lowercase; color: var(--muted); text-decoration: none; transition: color .2s; }
.page-nav a:hover { color: var(--ink); }
.page-nav .brand { font-family: 'Zen Antique Soft', serif; font-size: 1.2rem; letter-spacing: .1em; color: var(--ink); }
.page { flex: 1; max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 4rem; width: 100%; }
.page h1 { font-family: 'Zen Antique Soft', serif; font-size: 1.8rem; letter-spacing: .08em; font-weight: 400; margin-bottom: 2rem; }
.page p { font-size: .88rem; line-height: 1.9; font-weight: 200; color: var(--ink); margin-bottom: 1.2rem; }
.page a { color: var(--ink); }
.page .email-link { font-weight: 400; letter-spacing: .02em; }
.site-footer { border-top: 1px solid rgba(8,8,16,.08); padding: 1.8rem 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem 1.6rem; }
.site-footer a { font-size: .62rem; font-weight: 200; letter-spacing: .14em; text-transform: lowercase; color: var(--muted); text-decoration: none; transition: color .2s; }
.site-footer a:hover { color: var(--ink); }
.site-footer .footer-app { color: var(--ink); font-weight: 400; }
</style>
</head>
<body>

<nav class="page-nav">
  <a href="/" class="brand">Kokoon</a>
  <a href="/">&larr; home</a>
</nav>

<main class="page">
  <h1>Contact</h1>
  <p>We'd love to hear from you — whether it's feedback, a bug report, a feature idea, or just to say hello.</p>
  <p>Reach us at <a href="mailto:hello@kokoon.app" class="email-link">hello@kokoon.app</a></p>
  <p>We read every message and try to respond within a day or two.</p>
</main>

<footer class="site-footer">
  <a href="/pricing">pricing</a>
  <a href="/faq">faq</a>
  <a href="/privacy">privacy</a>
  <a href="/terms">terms</a>
  <a href="/contact">contact</a>
  <a href="/app" class="footer-app">open app &rarr;</a>
</footer>

</body>
</html>
