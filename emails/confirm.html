<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirm your Kokoon account</title>
</head>
<body style="margin:0;padding:0;background:#f7f2e8;font-family:Georgia,'Times New Roman',serif;color:#080810;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7f2e8;padding:48px 24px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td style="padding-bottom:32px;">
              <p style="margin:0;font-size:10px;letter-spacing:.38em;text-transform:uppercase;opacity:.32;font-family:Georgia,serif;">Kokoon</p>
            </td>
          </tr>

          <!-- Character illustration -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img src="{{ .SiteURL }}/chars/shiro.png" alt="Shiro — a ghost-white cat spirit" width="160" height="190" style="display:block;width:160px;height:auto;" />
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <h1 style="margin:0;font-size:26px;font-weight:normal;letter-spacing:.05em;line-height:1.3;">an egg is waiting for you</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:15px;line-height:1.75;opacity:.55;max-width:380px;">
                Confirm your email to start hatching creatures. Your first focus session is all it takes — 25 minutes of work, one egg, one creature you've never seen before.
              </p>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td align="center" style="padding-bottom:48px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background:#080810;color:#f7f2e8;text-decoration:none;font-size:10px;letter-spacing:.28em;text-transform:uppercase;padding:14px 40px;font-family:Georgia,serif;">
                confirm &amp; begin
              </a>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="border-top:1px solid rgba(8,8,16,.08);padding-top:24px;">
              <p style="margin:0;font-size:10px;letter-spacing:.12em;opacity:.25;line-height:1.8;">
                If you didn't create a Kokoon account, you can safely ignore this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
