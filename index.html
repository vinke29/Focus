<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokoon — Focus. Hatch rare creatures.</title>
<meta name="description" content="A focus timer disguised as a creature-collecting game. Stay focused, hatch rare creatures, build your collection.">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #080810;
  --paper: #f7f2e8;
  --blue: #0047ff;
  --muted: rgba(8,8,16,.42);
}

html { height: 100%; }

body {
  min-height: 100%;
  background: var(--paper);
  font-family: 'Noto Serif JP', serif;
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* Paper grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: .6;
}

/* ── Hero ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 1.5rem 3rem;
  gap: 1.8rem;
}

.hero-brand {
  font-family: 'Zen Antique Soft', serif;
  font-size: 2.4rem;
  letter-spacing: .1em;
  font-weight: 400;
}

.hero-tagline {
  font-size: .95rem;
  font-weight: 200;
  letter-spacing: .06em;
  color: var(--muted);
  max-width: 320px;
  line-height: 1.7;
}

.hero-illustration {
  display: flex;
  align-items: flex-end;
  gap: 0;
  position: relative;
  margin: .5rem 0;
}

.hero-illustration .hero-egg {
  position: relative;
  z-index: 1;
}

.hero-illustration .hero-creature {
  position: relative;
  z-index: 2;
  margin-left: -24px;
  margin-bottom: -4px;
}

.hero-cta {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: .72rem;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: lowercase;
  color: var(--paper);
  background: var(--ink);
  border: none;
  padding: .75rem 2.2rem;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .2s;
}

.hero-cta:hover { opacity: .78; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid rgba(8,8,16,.08);
  padding: 1.8rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: .5rem 1.6rem;
}

.site-footer a {
  font-size: .62rem;
  font-weight: 200;
  letter-spacing: .14em;
  text-transform: lowercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.site-footer a:hover { color: var(--ink); }

.site-footer .footer-app {
  color: var(--ink);
  font-weight: 400;
}

@media (max-width: 480px) {
  .hero-brand { font-size: 1.8rem; }
  .hero-tagline { font-size: .85rem; }
  .hero { padding: 3rem 1.5rem 2rem; }
}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-brand">Kokoon</h1>
  <p class="hero-tagline">A focus timer that hatches creatures.<br>Stay focused. Build your collection.</p>

  <div class="hero-illustration">
    <!-- Egg -->
    <div class="hero-egg">
      <svg width="90" height="114" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="eggGrd" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#fefcf5"/>
            <stop offset="100%" stop-color="#ddd8ca"/>
          </radialGradient>
          <radialGradient id="eggGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0047ff" stop-opacity=".18"/>
            <stop offset="100%" stop-color="#0047ff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="110" cy="268" rx="55" ry="9" fill="rgba(0,0,0,.1)"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#eggGrd)" stroke="#080810" stroke-width="4" stroke-linejoin="round"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#eggGlow)"/>
        <path d="M75,45 C82,32 96,24 105,22" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity=".7"/>
        <path d="M60,80 C64,68 70,58 76,52" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity=".4"/>
        <g opacity=".45">
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#0047ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".6"/>
        </g>
      </svg>
    </div>

    <!-- Shiro (creature) -->
    <div class="hero-creature">
      <svg width="120" height="142" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="h-shiro-body" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e5e0d5"/>
          </radialGradient>
          <radialGradient id="h-shiro-eye" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#ffc84a"/>
            <stop offset="100%" stop-color="#c87000"/>
          </radialGradient>
        </defs>
        <ellipse cx="160" cy="352" rx="66" ry="9" fill="rgba(0,0,0,.1)"/>
        <g>
          <!-- Tail -->
          <path d="M218,292 C252,272 272,242 260,210 C248,178 218,177 202,196 C186,215 200,240 214,248 C221,252 223,270 218,292 Z"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="3.5" stroke-linejoin="round"/>
          <!-- Body -->
          <ellipse cx="160" cy="258" rx="66" ry="72"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="4"/>
          <ellipse cx="160" cy="263" rx="38" ry="52"
            fill="white" stroke="#080810" stroke-width="2" opacity=".55"/>
          <!-- Left paw -->
          <ellipse cx="118" cy="324" rx="29" ry="15"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="3"/>
          <path d="M96,323 L100,331" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <path d="M110,326 L112,334" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <path d="M124,326 L124,334" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <!-- Right paw -->
          <ellipse cx="202" cy="324" rx="29" ry="15"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="3"/>
          <path d="M224,323 L220,331" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <path d="M210,326 L208,334" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <path d="M196,326 L196,334" stroke="#080810" stroke-width="2" stroke-linecap="round"/>
          <!-- Left ear -->
          <path d="M108,114 L95,62 L152,100 Z"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="3.5" stroke-linejoin="round"/>
          <path d="M112,109 L103,70 L146,98 Z" fill="#f0a500" opacity=".8"/>
          <!-- Right ear -->
          <path d="M212,114 L225,62 L168,100 Z"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="3.5" stroke-linejoin="round"/>
          <path d="M208,109 L217,70 L174,98 Z" fill="#f0a500" opacity=".8"/>
          <!-- Head -->
          <circle cx="160" cy="146" r="62"
            fill="url(#h-shiro-body)" stroke="#080810" stroke-width="4"/>
          <!-- Left eye -->
          <ellipse cx="134" cy="143" rx="22" ry="20" fill="white" stroke="#080810" stroke-width="3"/>
          <ellipse cx="134" cy="143" rx="15" ry="14" fill="url(#h-shiro-eye)"/>
          <path d="M134,130 C136,135 136,151 134,156 C132,151 132,135 134,130Z" fill="#080810"/>
          <circle cx="141" cy="137" r="4.5" fill="white" opacity=".9"/>
          <circle cx="127" cy="151" r="2" fill="white" opacity=".5"/>
          <!-- Right eye -->
          <ellipse cx="186" cy="143" rx="22" ry="20" fill="white" stroke="#080810" stroke-width="3"/>
          <ellipse cx="186" cy="143" rx="15" ry="14" fill="url(#h-shiro-eye)"/>
          <path d="M186,130 C188,135 188,151 186,156 C184,151 184,135 186,130Z" fill="#080810"/>
          <circle cx="193" cy="137" r="4.5" fill="white" opacity=".9"/>
          <circle cx="179" cy="151" r="2" fill="white" opacity=".5"/>
          <!-- Nose -->
          <path d="M155,162 L165,162 L160,169 Z" fill="#f0a500" opacity=".85"/>
          <!-- Mouth -->
          <path d="M154,169 C157,175 163,175 166,169" stroke="#080810" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Whiskers -->
          <line x1="100" y1="162" x2="146" y2="165" stroke="#080810" stroke-width="1.5" opacity=".4"/>
          <line x1="96" y1="171" x2="144" y2="170" stroke="#080810" stroke-width="1.4" opacity=".3"/>
          <line x1="220" y1="162" x2="174" y2="165" stroke="#080810" stroke-width="1.5" opacity=".4"/>
          <line x1="224" y1="171" x2="176" y2="170" stroke="#080810" stroke-width="1.4" opacity=".3"/>
        </g>
      </svg>
    </div>
  </div>

  <a href="/app" class="hero-cta">open kokoon</a>
</section>

<footer class="site-footer">
  <a href="/pricing">pricing</a>
  <a href="/faq">faq</a>
  <a href="/blog">blog</a>
  <a href="/privacy">privacy</a>
  <a href="/terms">terms</a>
  <a href="/contact">contact</a>
  <a href="/app" class="footer-app">open app &rarr;</a>
</footer>

</body>
</html>
