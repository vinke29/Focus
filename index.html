<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokoon — Focus. Hatch creatures. Build your collection.</title>
<meta name="description" content="Every focus session hatches a new creature. How many will you collect?">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #080810;
  --paper: #f7f2e8;
  --blue: #0047ff;
  --muted: rgba(8,8,16,.42);
}

html { height: 100%; }

body {
  min-height: 100%;
  background: var(--paper);
  font-family: 'Noto Serif JP', serif;
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* Paper grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: .6;
}

/* ── Hero ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 1.5rem 3rem;
  gap: 1.8rem;
}

.hero-brand {
  font-family: 'Zen Antique Soft', serif;
  font-size: 2.4rem;
  letter-spacing: .1em;
  font-weight: 400;
}

.hero-tagline {
  font-size: .95rem;
  font-weight: 400;
  letter-spacing: .06em;
  color: var(--ink);
  max-width: 320px;
  line-height: 1.7;
}

.hero-subtitle {
  font-size: .78rem;
  font-weight: 200;
  letter-spacing: .04em;
  color: var(--muted);
  max-width: 320px;
  line-height: 1.6;
  margin-top: -.8rem;
}

.hero-illustration {
  display: flex;
  align-items: flex-end;
  gap: 0;
  position: relative;
  margin: .5rem 0;
}

.hero-illustration .hero-egg {
  position: relative;
  z-index: 1;
}

.hero-illustration .hero-creature {
  position: relative;
  z-index: 2;
  margin-left: -20px;
  margin-bottom: -8px;
}

.hero-cta {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: .72rem;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: lowercase;
  color: var(--paper);
  background: var(--ink);
  border: none;
  padding: .75rem 2.2rem;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .2s;
}

.hero-cta:hover { opacity: .78; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid rgba(8,8,16,.08);
  padding: 1.8rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: .5rem 1.6rem;
}

.site-footer a {
  font-size: .62rem;
  font-weight: 200;
  letter-spacing: .14em;
  text-transform: lowercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.site-footer a:hover { color: var(--ink); }

.site-footer .footer-app {
  color: var(--ink);
  font-weight: 400;
}

@media (max-width: 480px) {
  .hero-brand { font-size: 1.8rem; }
  .hero-tagline { font-size: .85rem; }
  .hero { padding: 3rem 1.5rem 2rem; }
}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-brand">Kokoon</h1>
  <p class="hero-tagline">Focus. Hatch creatures. Build your collection.</p>
  <p class="hero-subtitle">Every focus session hatches a new creature. How many will you collect?</p>

  <div class="hero-illustration">
    <!-- Egg -->
    <div class="hero-egg">
      <svg width="90" height="114" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="eggGrd" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#fefcf5"/>
            <stop offset="100%" stop-color="#ddd8ca"/>
          </radialGradient>
          <radialGradient id="eggGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0047ff" stop-opacity=".18"/>
            <stop offset="100%" stop-color="#0047ff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="110" cy="268" rx="55" ry="9" fill="rgba(0,0,0,.1)"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#eggGrd)" stroke="#080810" stroke-width="4" stroke-linejoin="round"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#eggGlow)"/>
        <path d="M75,45 C82,32 96,24 105,22" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity=".7"/>
        <path d="M60,80 C64,68 70,58 76,52" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity=".4"/>
        <g opacity=".45">
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#0047ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".6"/>
        </g>
      </svg>
    </div>

    <!-- Phoenix (creature) -->
    <div class="hero-creature">
      <svg width="140" height="166" viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="h-phx-body" cx="35%" cy="28%" r="72%">
            <stop offset="0%" stop-color="#ffcc80"/>
            <stop offset="100%" stop-color="#e65100"/>
          </radialGradient>
          <radialGradient id="h-phx-wing" cx="40%" cy="25%" r="68%">
            <stop offset="0%" stop-color="#ffb74d"/>
            <stop offset="100%" stop-color="#bf360c"/>
          </radialGradient>
          <radialGradient id="h-phx-flame1" cx="30%" cy="20%" r="80%">
            <stop offset="0%" stop-color="#fff176"/>
            <stop offset="50%" stop-color="#ffb300"/>
            <stop offset="100%" stop-color="#e65100"/>
          </radialGradient>
          <radialGradient id="h-phx-flame2" cx="30%" cy="20%" r="80%">
            <stop offset="0%" stop-color="#ff8a65"/>
            <stop offset="60%" stop-color="#e53935"/>
            <stop offset="100%" stop-color="#880e4f"/>
          </radialGradient>
          <radialGradient id="h-phx-eye" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#fff9c4"/>
            <stop offset="100%" stop-color="#ffd600"/>
          </radialGradient>
          <filter id="h-phx-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <ellipse cx="160" cy="367" rx="58" ry="8" fill="rgba(0,0,0,.1)"/>
        <g>
          <!-- Tail feathers -->
          <path d="M138,272 C116,257 88,237 70,196 C80,212 88,232 86,252 C94,240 106,257 120,272Z"
            fill="url(#h-phx-flame2)" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M143,276 C126,257 113,230 116,196 C118,216 118,242 126,265Z"
            fill="url(#h-phx-flame1)" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M154,280 C147,257 147,227 154,192 C161,227 161,257 163,280Z"
            fill="url(#h-phx-flame1)" stroke="#080810" stroke-width="2.8" stroke-linejoin="round"/>
          <path d="M177,276 C194,257 207,230 204,196 C202,216 202,242 194,265Z"
            fill="url(#h-phx-flame1)" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M182,272 C204,257 232,237 250,196 C240,212 232,232 234,252 C226,240 214,257 200,272Z"
            fill="url(#h-phx-flame2)" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- Tail eyespots -->
          <ellipse cx="79" cy="250" rx="8" ry="12" fill="#fff176" stroke="#080810" stroke-width="1.5" opacity=".75"/>
          <ellipse cx="79" cy="250" rx="4" ry="6" fill="#e65100" opacity=".85"/>
          <ellipse cx="234" cy="250" rx="8" ry="12" fill="#fff176" stroke="#080810" stroke-width="1.5" opacity=".75"/>
          <ellipse cx="234" cy="250" rx="4" ry="6" fill="#e65100" opacity=".85"/>
          <!-- Flame tips -->
          <ellipse cx="154" cy="194" rx="10" ry="16" fill="#fff176" opacity=".85" filter="url(#h-phx-glow)"/>
          <ellipse cx="117" cy="200" rx="8" ry="12" fill="#ffb300" opacity=".65" filter="url(#h-phx-glow)"/>
          <ellipse cx="203" cy="200" rx="8" ry="12" fill="#ffb300" opacity=".65" filter="url(#h-phx-glow)"/>
          <!-- Wings -->
          <path d="M126,248 C103,230 88,216 83,198 C94,212 106,225 118,238 C106,225 104,210 108,198 C114,213 122,230 130,244Z"
            fill="url(#h-phx-wing)" stroke="#080810" stroke-width="2.8" stroke-linejoin="round"/>
          <path d="M194,248 C217,230 232,216 237,198 C226,212 214,225 202,238 C214,225 216,210 212,198 C206,213 198,230 190,244Z"
            fill="url(#h-phx-wing)" stroke="#080810" stroke-width="2.8" stroke-linejoin="round"/>
          <!-- Body -->
          <ellipse cx="160" cy="272" rx="66" ry="62" fill="url(#h-phx-body)" stroke="#080810" stroke-width="4"/>
          <path d="M128,267 C138,260 152,258 160,262 C168,258 182,260 192,267" stroke="#080810" stroke-width="1.5" fill="none" opacity=".2"/>
          <path d="M124,284 C135,276 152,274 160,278 C168,274 185,276 196,284" stroke="#080810" stroke-width="1.2" fill="none" opacity=".18"/>
          <!-- Talons -->
          <path d="M130,328 C124,340 120,347 116,352" stroke="#bf360c" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M116,352 L106,362" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M116,352 L116,364" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M116,352 L126,360" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M190,328 C196,340 200,347 204,352" stroke="#bf360c" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M204,352 L194,362" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M204,352 L204,364" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M204,352 L214,360" stroke="#bf360c" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <!-- Head -->
          <circle cx="160" cy="215" r="50" fill="url(#h-phx-body)" stroke="#080810" stroke-width="4"/>
          <!-- Flame crest -->
          <path d="M160,168 C154,148 150,128 158,108 C164,128 168,148 160,168Z"
            fill="url(#h-phx-flame1)" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M147,173 C137,152 131,130 138,111 C143,130 147,153 149,173Z"
            fill="url(#h-phx-flame2)" stroke="#080810" stroke-width="2" stroke-linejoin="round"/>
          <path d="M173,173 C183,152 189,130 182,111 C177,130 173,153 171,173Z"
            fill="url(#h-phx-flame2)" stroke="#080810" stroke-width="2" stroke-linejoin="round"/>
          <path d="M135,179 C127,162 123,144 130,130 C134,145 138,163 138,179Z"
            fill="#ffb300" stroke="#080810" stroke-width="1.8" stroke-linejoin="round" opacity=".8"/>
          <path d="M185,179 C193,162 197,144 190,130 C186,145 182,163 182,179Z"
            fill="#ffb300" stroke="#080810" stroke-width="1.8" stroke-linejoin="round" opacity=".8"/>
          <ellipse cx="160" cy="136" rx="18" ry="30" fill="#fff176" opacity=".5" filter="url(#h-phx-glow)"/>
          <!-- Beak -->
          <path d="M148,220 L160,230 L172,220 L160,225Z"
            fill="#ffd600" stroke="#080810" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- Eyes -->
          <ellipse cx="140" cy="211" rx="14" ry="13" fill="url(#h-phx-eye)" stroke="#080810" stroke-width="3"/>
          <ellipse cx="140" cy="212" rx="7" ry="6" fill="#080810"/>
          <circle cx="143" cy="208" r="3" fill="white" opacity=".85"/>
          <ellipse cx="180" cy="211" rx="14" ry="13" fill="url(#h-phx-eye)" stroke="#080810" stroke-width="3"/>
          <ellipse cx="180" cy="212" rx="7" ry="6" fill="#080810"/>
          <circle cx="183" cy="208" r="3" fill="white" opacity=".85"/>
        </g>
      </svg>
    </div>
  </div>

  <a href="/app" class="hero-cta">open kokoon</a>
</section>

<footer class="site-footer">
  <a href="/pricing">pricing</a>
  <a href="/faq">faq</a>
  <a href="/blog">blog</a>
  <a href="/privacy">privacy</a>
  <a href="/terms">terms</a>
  <a href="/contact">contact</a>
  <a href="/app" class="footer-app">open app &rarr;</a>
</footer>

</body>
</html>
