<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus · 集中</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body style="opacity:0">

<!-- ── AUTH VIEW ── -->
<div id="view-auth" class="view active">
  <div class="auth-logo">Focus · 集中</div>
  <div class="auth-container">
    <button id="btn-google" class="auth-btn-google">
      <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.251 17.64 11.943 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span>continue with google</span>
    </button>
    <p id="google-error" class="auth-error"></p>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin">sign in</button>
      <button class="auth-tab" id="tab-signup">sign up</button>
    </div>

    <!-- Sign in panel -->
    <div id="panel-signin" class="auth-panel">
      <input id="si-email"    type="email"    class="auth-input" placeholder="email"    autocomplete="email">
      <input id="si-password" type="password" class="auth-input" placeholder="password" autocomplete="current-password">
      <button id="btn-signin" class="auth-btn"><span>begin</span></button>
      <p id="si-error" class="auth-error"></p>
    </div>

    <!-- Sign up panel -->
    <div id="panel-signup" class="auth-panel" style="display:none">
      <input id="su-name"     type="text"     class="auth-input" placeholder="your name" autocomplete="name" maxlength="24">
      <input id="su-email"    type="email"    class="auth-input" placeholder="email"     autocomplete="email">
      <input id="su-password" type="password" class="auth-input" placeholder="password"  autocomplete="new-password">
      <button id="btn-signup" class="auth-btn"><span>create account</span></button>
      <p id="su-error" class="auth-error"></p>
    </div>

    <!-- Email confirmation notice (shown when Supabase requires it) -->
    <div id="auth-confirm" class="auth-panel" style="display:none">
      <p class="auth-confirm-msg">check your email to confirm your account, then sign in.</p>
      <button id="btn-goto-signin" class="auth-btn"><span>sign in</span></button>
    </div>
  </div>
</div>

<!-- ── ONBOARD VIEW ── -->
<div id="view-onboard" class="view">
  <div id="ob-slide-1" class="ob-slide">
    <div class="ob-logo">Focus · 集中</div>
    <p id="ob-intro-name" class="ob-intro-name"></p>
    <div class="ob-loop">
      <span class="ob-loop-step">focus your time</span>
      <span class="ob-loop-arrow">↓</span>
      <span class="ob-loop-step">hatch rare creatures</span>
      <span class="ob-loop-arrow">↓</span>
      <span class="ob-loop-step">build your collection</span>
    </div>
    <button id="ob-next" class="ob-btn"><span>→</span></button>
  </div>
  <div id="ob-slide-2" class="ob-slide">
    <p id="ob-greeting" class="ob-greeting"></p>
    <div id="ob-egg-wrap"><!-- egg injected by JS --></div>
    <p class="ob-hint">tap the egg to hatch your first creature</p>
  </div>
</div>

<!-- ── GLOBAL MUTE BUTTON ── -->
<button id="btn-mute" class="nav-btn mute-btn" title="Toggle sound">
  <svg class="icon-sound" viewBox="0 0 18 18" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 6.5h3l4.5-3.5v10L6 9.5H3z" fill="currentColor" stroke="none" opacity=".7"/>
    <path class="sv-waves" d="M12.5 6.8a3.2 3.2 0 0 1 0 4.4"/>
    <line class="sv-x" x1="12" y1="6.5" x2="16.5" y2="11.5"/>
    <line class="sv-x" x1="16.5" y1="6.5" x2="12" y2="11.5"/>
  </svg>
</button>

<!-- ── TIMER VIEW ── -->
<div id="view-timer" class="view">
  <button id="btn-open-collection" class="nav-btn">集</button>

  <main class="timer-main">
    <div id="egg-stage">
      <svg id="progress-ring" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-track" cx="130" cy="130" r="118"/>
        <circle id="ring-fill" class="ring-fill" cx="130" cy="130" r="118"/>
      </svg>
      <div id="timer-egg">
        <!-- egg injected by JS -->
      </div>
    </div>

    <div id="time-display">
      <span id="time-minutes">25</span><span class="time-sep">:</span><span id="time-seconds">00</span>
    </div>

    <div id="duration-picker">
      <button class="dur-btn active" data-min="25">25</button>
      <span class="dur-sep">·</span>
      <button class="dur-btn" data-min="45">45</button>
      <span class="dur-sep">·</span>
      <button class="dur-btn" data-min="60">60</button>
      <span class="dur-unit">min</span>
    </div>

    <button id="btn-start-focus"><span>begin focus</span></button>
    <div id="timer-stats"></div>
    <div id="streak-warning"></div>
    <button id="reminder-btn" aria-label="Toggle daily reminder"></button>
  </main>
</div>

<!-- ── HATCH VIEW ── -->
<div id="view-hatch" class="view">
  <div id="flash"></div>
  <div id="speed-wrap">
    <svg id="speed-svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice"></svg>
  </div>
  <canvas id="particles"></canvas>

  <div id="hatch-stage">
    <div id="hatch-header">
      <div id="hatch-session-num"></div>
      <div id="char-name"></div>
      <div id="char-sub"></div>
      <div id="char-rarity"></div>
      <div id="char-drop-hint"></div>
    </div>

    <div id="hatch-egg-wrap">
      <!-- Egg -->
      <svg id="hatch-egg" width="220" height="280" viewBox="0 0 220 280">
        <defs>
          <radialGradient id="heggGrd" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#fefcf5"/>
            <stop offset="100%" stop-color="#ddd8ca"/>
          </radialGradient>
          <radialGradient id="heggGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0047ff" stop-opacity=".22"/>
            <stop offset="100%" stop-color="#0047ff" stop-opacity="0"/>
          </radialGradient>
          <filter id="heggBlur"><feGaussianBlur stdDeviation="1.2"/></filter>
        </defs>
        <ellipse cx="110" cy="268" rx="55" ry="9" fill="rgba(0,0,0,.12)"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#heggGrd)" stroke="#080810" stroke-width="4" stroke-linejoin="round"/>
        <path d="M110,8 C158,8 196,60 196,148 C196,222 158,272 110,272 C62,272 24,222 24,148 C24,60 62,8 110,8 Z"
          fill="url(#heggGlow)"/>
        <path d="M75,45 C82,32 96,24 105,22" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity=".7"/>
        <path d="M60,80 C64,68 70,58 76,52" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity=".4"/>
        <g class="egg-rune" opacity=".5">
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#0047ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M118,85 L102,118 L114,118 L98,155" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".6"/>
        </g>
      </svg>

      <!-- Cracks -->
      <svg id="hatch-cracks" width="220" height="280" viewBox="0 0 220 280">
        <g stroke="#080810" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path id="hc1" d="M110,80 L98,102 L107,108 L95,132" stroke-width="2.5" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <path id="hc2" d="M107,108 L120,122 L115,138" stroke-width="2" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <path id="hc3" d="M138,90 L128,115 L135,125 L122,148" stroke-width="2" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <path id="hc4" d="M82,105 L92,128 L85,140" stroke-width="1.8" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <path id="hc5" d="M115,140 L130,158 L125,170" stroke-width="1.5" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <path id="hc1g" d="M110,80 L98,102 L107,108 L95,132" stroke="#00e5ff" stroke-width="1" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity=".7"/>
          <path id="hc2g" d="M107,108 L120,122 L115,138" stroke="#00e5ff" stroke-width=".8" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity=".6"/>
          <path id="hc3g" d="M138,90 L128,115 L135,125 L122,148" stroke="#00e5ff" stroke-width=".8" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity=".6"/>
        </g>
      </svg>

      <!-- Character revealed here -->
      <div id="char-wrap"></div>
    </div>

    <div id="hatch-actions">
      <button id="btn-share"><span>share</span></button>
      <button id="btn-see-collection"><span>collection</span></button>
      <button id="btn-focus-again"><span>focus again</span></button>
    </div>

    <div id="milestone-toast">
      <div id="milestone-num"></div>
      <div id="milestone-msg"></div>
    </div>
  </div>
</div>

<!-- ── COLLECTION VIEW ── -->
<div id="view-collection" class="view">
  <header class="collection-header">
    <div class="collection-top">
      <button id="btn-back-to-timer" class="nav-btn">←</button>
      <span class="collection-title" id="collection-title">collection</span>
      <button id="btn-dark" class="nav-btn dark-btn-inline" title="Toggle dark mode">
        <svg class="icon-dark" viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path class="icon-moon" d="M13.5 10a5 5 0 1 1-5.5-5.5 3.8 3.8 0 0 0 5.5 5.5z"/>
          <g class="icon-sun">
            <circle cx="9" cy="9" r="3"/>
            <line x1="9" y1="1.5" x2="9" y2="3"/><line x1="9" y1="15" x2="9" y2="16.5"/>
            <line x1="1.5" y1="9" x2="3" y2="9"/><line x1="15" y1="9" x2="16.5" y2="9"/>
            <line x1="4" y1="4" x2="5.1" y2="5.1"/><line x1="12.9" y1="12.9" x2="14" y2="14"/>
            <line x1="14" y1="4" x2="12.9" y2="5.1"/><line x1="5.1" y1="12.9" x2="4" y2="14"/>
          </g>
        </svg>
      </button>
      <button id="btn-signout" class="nav-btn signout-btn" title="Sign out">sign out</button>
    </div>
    <div id="collection-stats"></div>
    <div class="region-tabs">
      <button class="region-btn active" data-region="all">all <span class="tab-count"></span></button>
      <button class="region-btn" data-region="japanese">japan <span class="tab-count"></span></button>
      <button class="region-btn" data-region="americas">americas <span class="tab-count"></span></button>
      <button class="region-btn" data-region="european">europe <span class="tab-count"></span></button>
      <button class="region-btn" data-region="african">africa <span class="tab-count"></span></button>
      <button class="region-btn" data-region="fantasy">fantasy <span class="tab-count"></span></button>
    </div>
  </header>
  <div id="collection-grid">
    <!-- cards injected by JS -->
  </div>
</div>

<!-- ── CARD MODAL ── -->
<div id="card-modal" class="modal-overlay">
  <div id="card-modal-inner" class="modal-inner">
    <button id="modal-close" class="modal-close">×</button>

    <!-- Flippable card: click art to see lore/haiku on back -->
    <div id="modal-card" class="modal-card">
      <div class="modal-card-inner">
        <div class="modal-card-front">
          <div id="modal-art" class="modal-art"></div>
        </div>
        <div class="modal-card-back">
          <div id="modal-back-name" class="modal-back-name"></div>
          <div id="modal-back-lore" class="modal-back-lore"></div>
          <div id="modal-back-haiku" class="modal-back-haiku"></div>
          <div class="modal-back-meta">
            <span id="modal-back-odds"></span>
            <span id="modal-back-date"></span>
          </div>
          <div class="modal-back-hint">click to flip</div>
        </div>
      </div>
    </div>

    <!-- Info strip -->
    <div class="modal-info">
      <div id="modal-name" class="modal-name"></div>
      <div id="modal-sub" class="modal-sub"></div>
      <div id="modal-rarity" class="modal-rarity"></div>
      <!-- Variant navigation (hidden when only 1 variant owned) -->
      <div id="modal-var-nav" class="modal-var-nav">
        <button id="modal-prev" class="modal-nav-arrow">←</button>
        <span id="modal-var-label" class="modal-var-label"></span>
        <button id="modal-next" class="modal-nav-arrow">→</button>
      </div>
    </div>
  </div>
</div>

<!-- ── FUSION OVERLAY ── -->
<div id="fusion-overlay">
  <div id="fusion-stage">
    <div id="fusion-title">triple fusion</div>
    <div id="fusion-orbs-row">
      <div class="fusion-orb" id="fo0"></div>
      <div class="fusion-orb" id="fo1"></div>
      <div class="fusion-orb" id="fo2"></div>
      <div id="fusion-core"></div>
    </div>
    <div id="fusion-result">
      <div id="fusion-result-art"></div>
      <div id="fusion-result-name"></div>
      <div id="fusion-result-badge"></div>
    </div>
    <button id="btn-fusion-ok"><span>amazing</span></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="characters.js"></script>
<script src="sounds.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
