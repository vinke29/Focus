<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kokoon — Focus your time. Hatch creatures. Build your collection.</title>
<meta name="description" content="Every focus session hatches a new creature. How many will you collect?">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #080810;
  --paper: #fdf4e5;
  --blue: #0047ff;
  --muted: rgba(8,8,16,.42);
}

html { height: 100%; }

body {
  min-height: 100%;
  background: var(--paper);
  font-family: 'Noto Serif JP', serif;
  color: var(--ink);
  display: flex;
  flex-direction: column;
}


/* ── Hero ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2.5rem 1.5rem 1.5rem;
  gap: 1rem;
}

.hero-brand {
  font-family: 'Zen Antique Soft', serif;
  font-size: 2.4rem;
  letter-spacing: .1em;
  font-weight: 400;
}

.hero-tagline {
  font-size: .95rem;
  font-weight: 400;
  letter-spacing: .06em;
  color: var(--ink);
  max-width: 320px;
  line-height: 1.7;
}

.hero-illustration {
  width: 100%;
  max-width: 720px;
  margin: 0;
  position: relative;
}

.hero-illustration img {
  width: 100%;
  height: auto;
  display: block;
}

.hero-illustration::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  box-shadow: inset 0 0 40px 30px var(--paper);
}

.hero-cta {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: .72rem;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: lowercase;
  color: var(--paper);
  background: var(--ink);
  border: none;
  padding: .75rem 2.2rem;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .2s;
}

.hero-cta:hover { opacity: .78; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid rgba(8,8,16,.08);
  padding: 1.8rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: .5rem 1.6rem;
}

.site-footer a {
  font-size: .62rem;
  font-weight: 200;
  letter-spacing: .14em;
  text-transform: lowercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.site-footer a:hover { color: var(--ink); }

.site-footer .footer-app {
  color: var(--ink);
  font-weight: 400;
}

@media (max-width: 480px) {
  .hero-brand { font-size: 1.8rem; }
  .hero-tagline { font-size: .85rem; }
  .hero { padding: 2rem 1.5rem 1rem; }
}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-brand">Kokoon</h1>
  <p class="hero-tagline">Focus your time. Hatch creatures. Build your collection.</p>

  <div class="hero-illustration">
    <img src="hero.png" alt="Kokoon creatures — a collection of mythical and real creatures from around the world" loading="eager">
  </div>

  <a href="/app" class="hero-cta">open kokoon</a>
</section>

<footer class="site-footer">
  <a href="/pricing">pricing</a>
  <a href="/faq">faq</a>
  <a href="/blog">blog</a>
  <a href="/privacy">privacy</a>
  <a href="/terms">terms</a>
  <a href="/contact">contact</a>
  <a href="/app" class="footer-app">open app &rarr;</a>
</footer>

</body>
</html>
