<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokoon — Focus. Hatch creatures. Build your collection.</title>
<meta name="description" content="Every focus session hatches a new creature. How many will you collect?">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #080810;
  --paper: #f7f2e8;
  --blue: #0047ff;
  --muted: rgba(8,8,16,.42);
}

html { height: 100%; }

body {
  min-height: 100%;
  background: var(--paper);
  font-family: 'Noto Serif JP', serif;
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* Paper grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: .6;
}

/* ── Hero ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 1.5rem 3rem;
  gap: 1.8rem;
}

.hero-brand {
  font-family: 'Zen Antique Soft', serif;
  font-size: 2.4rem;
  letter-spacing: .1em;
  font-weight: 400;
}

.hero-tagline {
  font-size: .95rem;
  font-weight: 400;
  letter-spacing: .06em;
  color: var(--ink);
  max-width: 320px;
  line-height: 1.7;
}

.hero-illustration {
  width: 100%;
  max-width: 620px;
  margin: .5rem 0;
}

/* Creature animations */
@keyframes sFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes sRise {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-10px) rotate(-2deg); }
}
@keyframes sSoar {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  50%      { transform: rotate(-5deg) translateY(-4px); }
}
@keyframes sGill {
  0%, 100% { transform: rotate(0deg) scaleY(1); }
  50%      { transform: rotate(10deg) scaleY(1.08); }
}
@keyframes sEmber {
  0%, 100% { opacity: .5; transform: scale(1); }
  50%      { opacity: .9; transform: scale(1.14); }
}
@keyframes sEggPulse {
  0%, 100% { opacity: .3; }
  50%      { opacity: .6; }
}
.s-float  { animation: sFloat 3.5s ease-in-out infinite; transform-origin: center bottom; }
.s-float2 { animation: sFloat 3.8s ease-in-out infinite .5s; transform-origin: center bottom; }
.s-float3 { animation: sFloat 3.2s ease-in-out infinite 1s; transform-origin: center bottom; }
.s-rise   { animation: sRise  3.5s ease-in-out infinite; transform-origin: center bottom; }
.s-soar   { animation: sSoar  4s   ease-in-out infinite; transform-origin: center top; }
.s-gill-l { animation: sGill  2.4s ease-in-out infinite; transform-origin: 145px 170px; }
.s-gill-r { animation: sGill  2.4s ease-in-out infinite .4s; transform-origin: 175px 170px; }
.s-ember  { animation: sEmber 2s   ease-in-out infinite; transform-origin: center; }
.s-egg-glow { animation: sEggPulse 3s ease-in-out infinite; }

.hero-cta {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: .72rem;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: lowercase;
  color: var(--paper);
  background: var(--ink);
  border: none;
  padding: .75rem 2.2rem;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .2s;
}

.hero-cta:hover { opacity: .78; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid rgba(8,8,16,.08);
  padding: 1.8rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: .5rem 1.6rem;
}

.site-footer a {
  font-size: .62rem;
  font-weight: 200;
  letter-spacing: .14em;
  text-transform: lowercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.site-footer a:hover { color: var(--ink); }

.site-footer .footer-app {
  color: var(--ink);
  font-weight: 400;
}

@media (max-width: 480px) {
  .hero-brand { font-size: 1.8rem; }
  .hero-tagline { font-size: .85rem; }
  .hero { padding: 3rem 1.5rem 2rem; }
}
</style>
</head>
