<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Confirmed — Kokoon</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --ink: #080810; --paper: #fdf4e5; --muted: rgba(8,8,16,.42); }
html, body { height: 100%; background: var(--paper); font-family: 'Georgia', serif; color: var(--ink); }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: .08em; margin-bottom: .75rem; }
p  { font-size: .85rem; color: var(--muted); letter-spacing: .04em; line-height: 1.7; margin-bottom: 1.5rem; }
a, button {
  display: inline-block; padding: .75rem 2rem;
  border: 1.5px solid var(--ink); background: transparent;
  font-size: .8rem; letter-spacing: .12em; cursor: pointer;
  color: var(--ink); text-decoration: none; transition: background .2s, color .2s;
}
a:hover, button:hover { background: var(--ink); color: var(--paper); }
#loading { font-size: .8rem; color: var(--muted); letter-spacing: .06em; }
#content { display: none; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<div id="loading">confirming your email…</div>

<div id="content">
  <h1>Kokoon</h1>
  <p id="msg">your email has been confirmed.<br>open the app to start your collection.</p>
  <a id="app-link" href="app.kokoon.focus://confirm" style="display:none">open kokoon</a>
  <a href="https://apps.apple.com/app/id6741886982" id="store-link" style="display:none">download on the app store</a>
</div>

<script>
const SUPABASE_URL = 'https://bvfxxedhvdknwvvkyuph.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XyzHbIwzLhRbGbqOfIY8UA_K8Gfw78R';

(async () => {
  const loading = document.getElementById('loading');
  const content = document.getElementById('content');
  const isIOS   = /iPhone|iPad|iPod/.test(navigator.userAgent);

  try {
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      await sb.auth.exchangeCodeForSession(window.location.href);
    }
  } catch(e) { /* non-fatal — confirmation may already be done */ }

  loading.style.display = 'none';
  content.style.display = 'flex';

  if (isIOS) {
    // Try to open app, show "open kokoon" button
    document.getElementById('app-link').style.display = 'inline-block';
    window.location.href = 'app.kokoon.focus://confirm';
  } else {
    // Desktop — show App Store link
    document.getElementById('store-link').style.display = 'inline-block';
  }
})();
</script>
</body>
</html>
